# Supabase local config for Catering Berkah 1121.
# See https://supabase.com/docs/guides/cli/config
project_id = "catering-berkah-1121"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = false          # accounts are provisioned by Super Admin only
enable_confirmations = false   # internal accounts use synthetic emails

[auth.email]
enable_signup = false
enable_confirmations = false
